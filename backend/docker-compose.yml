services:
  postgres:
    image: postgres:17-alpine
    container_name: parbin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: parbin
      POSTGRES_USER: parbin
      POSTGRES_PASSWORD: parbin
    volumes:
      - parbin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parbin_postgres_data:
